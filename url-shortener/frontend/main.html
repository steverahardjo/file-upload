<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Distributed Video Processor</title>
        <style>
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                max-width: 800px;
                margin: 40px auto;
                padding: 20px;
                line-height: 1.6;
                background-color: #f4f7f6;
            }
            .card {
                background: white;
                padding: 2rem;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            h1 {
                color: #2c3e50;
                border-bottom: 2px solid #3498db;
                padding-bottom: 10px;
            }
            .upload-section {
                margin: 20px 0;
                border: 2px dashed #bdc3c7;
                padding: 30px;
                text-align: center;
                border-radius: 8px;
                transition: 0.3s;
            }
            .upload-section:hover {
                border-color: #3498db;
                background: #f0f7ff;
            }
            button {
                background: #3498db;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 4px;
                cursor: pointer;
                font-size: 16px;
            }
            button:disabled {
                background: #bdc3c7;
            }
            #status-container {
                margin-top: 20px;
                display: none;
            }
            .progress-bar {
                width: 100%;
                background: #eee;
                border-radius: 10px;
                height: 20px;
                overflow: hidden;
                margin: 10px 0;
            }
            .progress-fill {
                width: 0%;
                height: 100%;
                background: #2ecc71;
                transition: width 0.3s;
            }
            .badge {
                display: inline-block;
                padding: 4px 8px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: bold;
                margin-right: 5px;
            }
            .badge-info {
                background: #d1ecf1;
                color: #0c5460;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Distributed Video Storing & Serving</h1>
            <p>
                Upload MP4/MP3 files. Our Go-backend will automatically scale
                processing based on file size.
            </p>

            <div class="upload-section" id="drop-zone">
                <input
                    type="file"
                    id="video-input"
                    accept="video/mp4,audio/mpeg"
                    style="display: none"
                />
                <button
                    onclick="document.getElementById('video-input').click()"
                >
                    Select Video File
                </button>
                <p id="file-info">No file selected</p>
            </div>

            <div id="status-container">
                <h3 id="process-title">Processing File...</h3>
                <div class="progress-bar">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <p id="details">
                    Detecting size and initializing FFmpeg pipeline...
                </p>
                <div id="resolution-badges">
                    <span class="badge badge-info">Source</span>
                    <span id="badge-480" class="badge" style="background: #eee"
                        >480p</span
                    >
                    <span id="badge-720" class="badge" style="background: #eee"
                        >720p</span
                    >
                    <span id="badge-1080" class="badge" style="background: #eee"
                        >1080p</span
                    >
                </div>
            </div>
        </div>

        <script>
            const fileInput = document.getElementById("video-input");
            const fileInfo = document.getElementById("file-info");
            const statusContainer = document.getElementById("status-container");
            const progressFill = document.getElementById("progress-fill");
            const details = document.getElementById("details");

            fileInput.onchange = () => {
                const file = fileInput.files[0];
                if (file) {
                    const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                    fileInfo.innerHTML = `<strong>${file.name}</strong> (${sizeMB} MB)`;
                    handleUpload(file);
                }
            };

            async function handleUpload(file) {
                statusContainer.style.display = "block";
                const formData = new FormData();
                formData.append("file", file);

                // Client-side size detection to set expectations
                if (file.size > 50 * 1024 * 1024) {
                    details.innerText =
                        "Large file detected (>50MB). Switching to Async Distributed Mode...";
                } else {
                    details.innerText =
                        "Standard file detected. Processing immediately...";
                }

                try {
                    const response = await fetch("/upload", {
                        method: "POST",
                        body: formData,
                    });

                    if (response.ok) {
                        const result = await response.json();
                        updateUIComplete(result);
                    } else {
                        details.innerText = "Error during upload/processing.";
                        details.style.color = "red";
                    }
                } catch (err) {
                    console.error(err);
                    details.innerText = "Connection failed.";
                }
            }

            function updateUIComplete(data) {
                progressFill.style.width = "100%";
                details.innerText = "Finished! Versions stored in MinIO.";
                document.getElementById("badge-480").style.background =
                    "#2ecc71";
                document.getElementById("badge-480").style.color = "white";
                document.getElementById("badge-720").style.background =
                    "#2ecc71";
                document.getElementById("badge-720").style.color = "white";
                // You can add logic here to only light up badges based on what Go actually processed
            }
        </script>
    </body>
</html>
